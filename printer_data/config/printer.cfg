################## MAIN BOARD ####################
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_30FFDF053347543015892051-if00
#serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_
restart_method: command     

################### TOOL HEAD ###################
[mcu extra_mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_30FF6F064746363950511557-if00
#serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_
restart_method: command

################## EDDY NG ##################### EDDY-NG start
[mcu eddy] #26-05-02  26-06-01
## FOR USB: replace this with your serial port ID
## FOR CANBUS: replace this with your canbus UUID
serial: /dev/serial/by-id/usb-Klipper_rp2040_50443404083DB01C-if00 #26-05-02 26-06-01
restart_method: command

[probe_eddy_ng btt_eddy] #26-06-01
sensor_type: btt_eddy
i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: -16.00 #26-05-02
y_offset: 11.5 #26-05-02 

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 100

[temperature_sensor btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26
############################################# EDDY-NG end

# 26-01-11 ########################
[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PA8,   EXP1_2=PC9,
    EXP1_3=PA10,  EXP1_4=PA9,
    EXP1_5=PC11,  EXP1_6=PC10,
    EXP1_7=PD8,   EXP1_8=PC12,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PB14,  EXP2_2=PB13,
    EXP2_3=PC7,   EXP2_4=PB12,
    EXP2_5=PC6,   EXP2_6=PB15,
    EXP2_7=PC8,   EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<5V>

[display]                    
lcd_type: uc1701
cs_pin: EXP1_3
a0_pin: EXP1_4
rst_pin: EXP1_5
encoder_pins: ^EXP2_5, ^EXP2_3
click_pin: ^!EXP1_2
contrast: 63
spi_software_miso_pin: EXP2_1
spi_software_mosi_pin: EXP2_6
spi_software_sclk_pin: EXP2_2

[neopixel Screen_Colour]     
pin: EXP1_6
chain_count: 3
color_order: RGB             
initial_RED: 0.5             
initial_GREEN: 0.4           
initial_BLUE: 0.7  
